<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cliente - Maridão de Aluguel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card auth-card-wide">
      <div class="auth-header">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          Maridão de Aluguel
        </div>
        <h1 class="auth-title">Cadastro de Cliente</h1>
        <p class="auth-description">Crie sua conta para solicitar serviços</p>
      </div>

      <form class="auth-form" action="/cadastro/cliente" method="POST">
        <input type="hidden" name="_token" value="{{ csrf_token() }}">
        
        <h3 class="form-section-title">Dados Pessoais</h3>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="nome">Nome Completo *</label>
            <input type="text" id="nome" name="nome" class="form-input" placeholder="Seu nome completo" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" class="form-input" placeholder="000.000.000-00" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="email">E-mail *</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="seu@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="telefone">Telefone *</label>
            <input type="tel" id="telefone" name="telefone" class="form-input" placeholder="(00) 00000-0000" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="data_nascimento">Data de Nascimento *</label>
            <input type="date" id="data_nascimento" name="data_nascimento" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="genero">Gênero</label>
            <select id="genero" name="genero" class="form-select">
              <option value="">Selecione</option>
              <option value="masculino">Masculino</option>
              <option value="feminino">Feminino</option>
              <option value="outro">Outro</option>
              <option value="prefiro_nao_informar">Prefiro não informar</option>
            </select>
          </div>
        </div>

        <h3 class="form-section-title">Endereço</h3>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cep">CEP *</label>
            <input type="text" id="cep" name="cep" class="form-input" placeholder="00000-000" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="estado">Estado *</label>
            <select id="estado" name="estado" class="form-select" required>
              <option value="">Selecione</option>
              <option value="AC">Acre</option>
              <option value="AL">Alagoas</option>
              <option value="AP">Amapá</option>
              <option value="AM">Amazonas</option>
              <option value="BA">Bahia</option>
              <option value="CE">Ceará</option>
              <option value="DF">Distrito Federal</option>
              <option value="ES">Espírito Santo</option>
              <option value="GO">Goiás</option>
              <option value="MA">Maranhão</option>
              <option value="MT">Mato Grosso</option>
              <option value="MS">Mato Grosso do Sul</option>
              <option value="MG">Minas Gerais</option>
              <option value="PA">Pará</option>
              <option value="PB">Paraíba</option>
              <option value="PR">Paraná</option>
              <option value="PE">Pernambuco</option>
              <option value="PI">Piauí</option>
              <option value="RJ">Rio de Janeiro</option>
              <option value="RN">Rio Grande do Norte</option>
              <option value="RS">Rio Grande do Sul</option>
              <option value="RO">Rondônia</option>
              <option value="RR">Roraima</option>
              <option value="SC">Santa Catarina</option>
              <option value="SP">São Paulo</option>
              <option value="SE">Sergipe</option>
              <option value="TO">Tocantins</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cidade">Cidade *</label>
            <input type="text" id="cidade" name="cidade" class="form-input" placeholder="Sua cidade" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="bairro">Bairro *</label>
            <input type="text" id="bairro" name="bairro" class="form-input" placeholder="Seu bairro" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="endereco">Endereço Completo *</label>
          <input type="text" id="endereco" name="endereco" class="form-input" placeholder="Rua, número, complemento" required>
        </div>

        <h3 class="form-section-title">Segurança</h3>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="senha">Senha *</label>
            <input type="password" id="senha" name="senha" class="form-input" placeholder="Mínimo 8 caracteres" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label" for="senha_confirmacao">Confirmar Senha *</label>
            <input type="password" id="senha_confirmacao" name="senha_confirmacao" class="form-input" placeholder="Confirme sua senha" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" name="termos" required>
            <span class="text-sm">Li e aceito os <a href="/termos" class="text-primary">Termos de Uso</a> e <a href="/privacidade" class="text-primary">Política de Privacidade</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Criar Conta
        </button>
      </form>

      <div class="auth-footer">
        <p class="text-muted">
          Já tem uma conta? <a href="/login">Faça login</a>
        </p>
        <p class="text-muted mt-sm">
          Quer prestar serviços? <a href="/cadastro/prestador">Cadastre-se como Prestador</a>
        </p>
      </div>
    </div>
  </div>

  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--background) 100%);
    }

    .auth-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--spacing-2xl);
      width: 100%;
      max-width: 420px;
    }

    .auth-card-wide {
      max-width: 640px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .auth-header .logo {
      justify-content: center;
      margin-bottom: var(--spacing-lg);
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
    }

    .auth-description {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .auth-form {
      margin-bottom: var(--spacing-lg);
    }

    .form-section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--border);
    }

    .form-section-title:first-of-type {
      margin-top: 0;
    }

    .auth-footer {
      text-align: center;
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border);
    }

    .auth-footer p {
      font-size: 0.875rem;
    }
  </style>
</body>
</html>
