<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Maridão de Aluguel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">
          <div class="logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
          </div>
          Maridão de Aluguel
        </div>
        <h1 class="auth-title">Bem-vindo de volta</h1>
        <p class="auth-description">Entre na sua conta para continuar</p>
      </div>

      <form class="auth-form" action="/login" method="POST">
        <!-- CSRF Token para Laravel -->
        <input type="hidden" name="_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Sua senha" required>
        </div>

        <div class="form-group flex justify-between items-center">
          <label class="form-checkbox">
            <input type="checkbox" name="remember">
            <span class="text-sm">Lembrar de mim</span>
          </label>
          <a href="/recuperar-senha" class="text-sm text-primary">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">
          Entrar
        </button>
      </form>

      <div class="auth-footer">
        <p class="text-muted">
          Não tem uma conta? 
          <a href="/cadastro/cliente">Cadastre-se como Cliente</a>
          ou
          <a href="/cadastro/prestador">Cadastre-se como Prestador</a>
        </p>
      </div>
    </div>
  </div>

  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      background: linear-gradient(135deg, var(--primary-light) 0%, var(--background) 100%);
    }

    .auth-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--spacing-2xl);
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .auth-header .logo {
      justify-content: center;
      margin-bottom: var(--spacing-lg);
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
    }

    .auth-description {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .auth-form {
      margin-bottom: var(--spacing-lg);
    }

    .auth-footer {
      text-align: center;
      padding-top: var(--spacing-lg);
      border-top: 1px solid var(--border);
    }

    .auth-footer p {
      font-size: 0.875rem;
    }
  </style>
</body>
</html>
